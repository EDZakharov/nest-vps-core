# =============================================================================
# VPN Core Service - Docker Compose (Production)
# =============================================================================
# Runs nginx, xray, and nest-vps-core in Docker containers
# =============================================================================

version: '3.8'

services:
  # ---------------------------------------------------------------------------
  # Nginx - HTTP/HTTPS proxy and SSL termination
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: vpn-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./html:/var/www/html:ro
    networks:
      - vpn-network
    depends_on:
      - xray
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 3s
      retries: 3

  # ---------------------------------------------------------------------------
  # Xray - VLESS REALITY VPN server
  # ---------------------------------------------------------------------------
  xray:
    image: ghcr.io/xtls/xray-core:latest
    container_name: vpn-xray
    restart: unless-stopped
    ports:
      - "443:443"
    volumes:
      - ./xray/config.json:/etc/xray/config.json:ro
      - ./xray/.keys:/etc/xray/.keys:ro
    networks:
      - vpn-network
    cap_add:
      - NET_ADMIN
      - NET_RAW
    sysctls:
      - net.ipv4.ip_forward=1
    healthcheck:
      test: ["CMD", "xray", "test", "-config", "/etc/xray/config.json"]
      interval: 30s
      timeout: 3s
      retries: 3

  # ---------------------------------------------------------------------------
  # VPN Core - NestJS API for managing Xray
  # ---------------------------------------------------------------------------
  vpn-core:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: vpn-core
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "8080"
    volumes:
      - ./xray/.keys:/usr/local/etc/xray/.keys:ro
      - ./xray/config.json:/usr/local/etc/xray/config.json:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - vpn-network
    depends_on:
      - xray
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

networks:
  vpn-network:
    driver: bridge
