events {
    worker_connections 1024;
}

http {
    # HTTP server for ACME challenge
    server {
        listen 80;
        server_name _;
        root /var/www/html;
        
        location /.well-known/acme-challenge/ {
            root /var/www/html;
        }
        
        location / {
            return 301 https://$host$request_uri;
        }
    }
    
    # HTTPS server - fallback for REALITY
    server {
        listen 443 ssl http2;
        server_name _;
        
        ssl_certificate /etc/nginx/ssl/xray.crt;
        ssl_certificate_key /etc/nginx/ssl/xray.key;
        
        # Fallback for REALITY - close connection
        location / {
            return 444;
        }
    }
}
