events {
    worker_connections 1024;
}

http {
    # HTTP server for ACME challenge
    server {
        listen 80;
        server_name _;
        root /var/www/html;

        location /.well-known/acme-challenge/ {
            root /var/www/html;
        }

        # Proxy API requests to vpn-core
        location /api/ {
            proxy_pass http://vpn-core:8080;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS server - fallback for REALITY + API proxy
    server {
        listen 443 ssl http2;
        server_name _;

        ssl_certificate /etc/nginx/ssl/xray.crt;
        ssl_certificate_key /etc/nginx/ssl/xray.key;

        # Proxy API requests to vpn-core
        location /api/ {
            proxy_pass http://vpn-core:8080;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Fallback for REALITY - close connection
        location / {
            return 444;
        }
    }
}
