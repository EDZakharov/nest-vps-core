# =============================================================================
# VPN Core Service - Production Docker Compose
# =============================================================================
# Complete VPN server with nginx, xray, certbot, and nest-vps-core
# =============================================================================

version: '3.8'

services:
  # ---------------------------------------------------------------------------
  # Nginx - HTTP/HTTPS proxy and SSL termination
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: vpn-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./html:/var/www/html:ro
      - ./acme:/etc/nginx/acme:ro
    networks:
      - vpn-network
    depends_on:
      - xray
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 3s
      retries: 3

  # ---------------------------------------------------------------------------
  # Xray - VLESS REALITY VPN server
  # ---------------------------------------------------------------------------
  xray:
    image: ghcr.io/xtls/xray-core:latest
    container_name: vpn-xray
    restart: unless-stopped
    ports:
      - "443:443"
    volumes:
      - ./xray/config.json:/etc/xray/config.json:ro
    command: ["run", "-config", "/etc/xray/config.json"]
    networks:
      - vpn-network
    cap_add:
      - NET_ADMIN
      - NET_RAW
    sysctls:
      - net.ipv4.ip_forward=1
    healthcheck:
      test: ["CMD", "xray", "test", "-config", "/etc/xray/config.json"]
      interval: 30s
      timeout: 3s
      retries: 3

  # ---------------------------------------------------------------------------
  # Certbot - SSL certificate management
  # ---------------------------------------------------------------------------
  certbot:
    image: certbot/certbot
    container_name: vpn-certbot
    restart: unless-stopped
    volumes:
      - ./acme:/etc/letsencrypt:rw
      - ./html:/var/www/html:ro
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - vpn-network

  # ---------------------------------------------------------------------------
  # VPN Core - NestJS API for managing Xray
  # ---------------------------------------------------------------------------
  vpn-core:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: vpn-core
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8080:8080"
    volumes:
      - ./xray:/opt/xray:rw
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - vpn-network
    depends_on:
      - xray
      - nginx
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

networks:
  vpn-network:
    driver: bridge
