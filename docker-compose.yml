# =============================================================================
# VPN Core Service - Docker Compose
# =============================================================================

version: '3.8'

services:
  # ---------------------------------------------------------------------------
  # VPN Core (NestJS API)
  # ---------------------------------------------------------------------------
  vpn-core:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: vpn-core
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8081:8080"
    volumes:
      - /usr/local/etc/xray/.keys:/usr/local/etc/xray/.keys
      - /usr/local/etc/xray/config.json:/usr/local/etc/xray/config.json
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - vpn-core-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

networks:
  vpn-core-network:
    driver: bridge
